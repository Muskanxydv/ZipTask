{% extends "base.html" %}
{% block title %}Login - ZipTask{% endblock %}

{% block content %}
<section class="auth-wrapper">
  <div class="auth-card">
    <div class="auth-header">
      <h1 class="auth-title">Welcome Back</h1>
      <p class="auth-subtitle">Log in to your ZipTask account</p>
    </div>

    <form class="auth-form" action="#">
      <div class="form-group">
        <label for="email" class="form-label">Email Address</label>
        <input type="email" id="email" name="email" class="form-input" placeholder="your@email.com" required>
      </div>

      <div class="form-group">
        <label for="password" class="form-label">Password</label>
        <input type="password" id="password" name="password" class="form-input" placeholder="Enter your password" required>
      </div>
      
      <div class="form-options">
        <label class="checkbox-label">
          <input type="checkbox" class="form-checkbox">
          <span>Remember me</span>
        </label>
        <a href="{{ url_for('forgot_password') }}" class="forgot-link">Forgot password?</a>
      </div>

      <div style="display: flex; flex-direction: column; gap: 0.5rem; width: 100%;">
          <button type="submit" class="btn btn-primary" style="width: 100%;">Log In</button>
      </div>
    </form>

    <div class="auth-footer">
      <p>Don't have an account? <a href="{{ url_for('register') }}" class="auth-link">Sign up</a></p>
    </div>
  </div>
</section>
{% endblock %}
