<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign Up - ZipTask</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/main.css') }}">
</head>

<body>
    <!-- Header -->
    <header class="header">
        <div class="container header-content">
            <div class="logo">
                <div class="logo-icon">
                    <img src="{{ url_for('static', filename='images/Icon.png') }}" alt="ZipTask Logo">
                </div>
                <span class="logo-text">ZipTask</span>
            </div>

            <nav class="nav">
                <a href="{{ url_for('home') }}" class="nav-link">Home</a>
                <a href="{{ url_for('about') }}" class="nav-link">About Us</a>
                <a href="{{ url_for('login') }}" class="nav-link">Login</a>
            </nav>

            <a href="{{ url_for('register') }}" class="btn btn-primary">Get Started</a>
        </div>
    </header>

    <!-- Main Content -->
    <main class="signup-main">
        <div class="signup-container">
            <div class="signup-header">
                <h2 class="signup-title">Create Your Account</h2>
                <p class="signup-subtitle">Choose the Account type you want to create</p>
            </div>

            <div class="signup-buttons">
                <button class="signup-btn" id="seekerBtn" onclick="toggleForm('user')">
                    Register as a User
                </button>
            </div>

            <!-- Registeration Form -->
            <div class="signup-form-container" id="signupForm" style="display: none;">
                <div class="form-card">
                    <div class="form-header">
                        <h3 class="form-title">User Registration</h3>

                    </div>

                    <form class="signup-form" method="POST" action="{{ url_for('auth.register_user') }}">>
                        <div class="form-group">
                            <label for="user-fullname" class="form-label">Full Name</label>
                            <input type="text" id="user-fullname" name="fullname" class="form-input"
                                placeholder="Enter your full name" required />
                        </div>

                        <div class="form-group">
                            <label for="user-email" class="form-label">Email Address</label>
                            <input type="email" id="user-email" name="email" class="form-input"
                                placeholder="Enter your email" required />
                        </div>

                        <div class="form-group">
                            <label for="user-phone" class="form-label">Phone Number</label>
                            <input type="tel" id="user-phone" name="phone" class="form-input"
                                placeholder="Enter your phone number" required />
                        </div>

                        <div class="form-group">
                            <label for="user-password" class="form-label">Password</label>
                            <input type="password" id="user-password" name="password" class="form-input"
                                placeholder="Create a password" required />
                        </div>

                        <div class="form-group">
                            <label for="user-confirm-password" class="form-label">Confirm Password</label>
                            <input type="password" id="user-confirm-password" name="confirmPassword"
                                class="form-input" placeholder="Re-enter your password" required />
                        </div>

                        <div class="sign-checkbox">
                            <input type="checkbox" id="user-terms" name="terms" required />
                            <label for="user-terms">I agree to the Terms of Service and Privacy Policy</label>
                        </div>

                        <button type="submit" class="btn-submit">Create Account</button>

                        <div class="divider">
                            <span>Or continue with</span>
                        </div>

                        <button type="button" class="btn-google">
                            <svg width="20" height="20" viewBox="0 0 24 24">
                                <path fill="#4285F4"
                                    d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" />
                                <path fill="#34A853"
                                    d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" />
                                <path fill="#FBBC05"
                                    d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z" />
                                <path fill="#EA4335"
                                    d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" />
                            </svg>
                            <span>Sign up with Google</span>
                        </button>
                    </form>
                </div>
            </div>
            <div class="signup-footer-text">
                Already have an account? <a href="{{ url_for('login') }}" class="link">Sign in</a>
            </div>
        </div>
    </main>

    <!-- Footer -->
     <footer>
    <div class="container footer-content">
        <div class="footer-brand">
            <div class="logo-icon">
                <img src="{{ url_for('static', filename='images/Icon.png') }}" alt="ZipTask Logo">
            </div>
            <div>
                <span class="footer-logo-text">ZipTask</span>
                <p class="footer-description">
                    Hyperlocal errand marketplace connecting task<br>
                    posters with eager workers.
                </p>
            </div>
        </div>

        <div class="footer-copyright">
            © 2026 ZipTask. All rights reserved.
        </div>
    </div>
     </footer>

    <script>
        let activeForm = null;

        function toggleForm(type) {
            const signupForm = document.getElementById('signupForm');

            if (type === 'user') {
                if (activeForm === 'user') {
                    // Close the form if already open
                    signupForm.style.display = 'none';
                    activeForm = null;
                } else {
                    // Open user form, close other forms
                    signupForm.style.display = 'block';
                    activeForm = 'user';
                }
            }

        }
    </script>
</body>

</html>
