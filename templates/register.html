{% extends "base.html" %}
{% block title %}Sign Up - ZipTask{% endblock %}

{% block content %}
<section class="auth-wrapper">
  <div class="auth-card">
    <div class="auth-header">
      <h1 class="auth-title">Create Account</h1>
      <p class="auth-subtitle">Join thousands of locals getting things done!</p>
    </div>

    <form class="auth-form" method="POST" action="{{ url_for('auth.register_user') }}">
      <div class="form-group">
        <label for="user-fullname" class="form-label">Full Name</label>
        <input type="text" id="user-fullname" name="fullname" class="form-input" placeholder="Enter your full name" required>
      </div>

      <div class="form-group">
        <label for="user-email" class="form-label">Email Address</label>
        <input type="email" id="user-email" name="email" class="form-input" placeholder="Enter your email" required>
      </div>
      
      <div class="form-group">
        <label for="user-phone" class="form-label">Phone Number</label>
        <input type="tel" id="user-phone" name="phone" class="form-input" placeholder="Enter your phone number" required>
      </div>

      <div class="form-group">
        <label for="user-password" class="form-label">Password</label>
        <input type="password" id="user-password" name="password" class="form-input" placeholder="Create a password" required>
      </div>
      
      <div class="form-options">
        <label class="checkbox-label" style="align-items: flex-start;">
          <input type="checkbox" id="user-terms" name="terms" required style="margin-top: 4px;">
          <span>I agree to the Terms of Service and Privacy Policy</span>
        </label>
      </div>

      <div style="display: flex; flex-direction: column; gap: 0.5rem; width: 100%;">
          <button type="submit" class="btn btn-primary" style="width: 100%;">Create Account</button>
      </div>
    </form>

    <div class="auth-footer">
      <p>Already have an account? <a href="{{ url_for('login') }}" class="auth-link">Sign in</a></p>
    </div>
  </div>
</section>
{% endblock %}
