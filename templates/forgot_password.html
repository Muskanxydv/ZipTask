{% extends "base.html" %}
{% block title %}Forgot Password - ZipTask{% endblock %}

{% block content %}
<section class="auth-wrapper">
  <div class="auth-card">
    <div class="auth-header">
      <div style="display: flex; justify-content: center; margin-bottom: 1rem; color: var(--primary);">
        <i data-lucide="key-round" style="width: 48px; height: 48px;"></i>
      </div>
      <h1 class="auth-title">Forgot Password?</h1>
      <p class="auth-subtitle">No worries! Enter your email and we'll send you a reset link.</p>
    </div>

    <form class="auth-form" action="#">
      <div class="form-group">
        <label for="email" class="form-label">Email Address</label>
        <input type="email" id="email" name="email" class="form-input" placeholder="your@email.com" required>
      </div>

      <div style="display: flex; flex-direction: column; gap: 0.5rem; width: 100%;">
          <button type="submit" class="btn btn-primary" style="width: 100%;">Send Reset Link</button>
      </div>
    </form>

    <div class="auth-footer" style="display: flex; flex-direction: column; gap: 1rem;">
      <a href="{{ url_for('login') }}" class="auth-link" style="display: inline-flex; align-items: center; justify-content: center; gap: 0.5rem;">
        <i data-lucide="arrow-left"></i> Back to Login
      </a>
      <p style="font-size: 0.85rem; color: var(--text-muted); background: var(--bg-color); padding: 1rem; border-radius: var(--radius-md);">
        Secure Process: Your security is our priority. The reset link expires in 24 hours.
      </p>
    </div>
  </div>
</section>
{% endblock %}
